---
name: Ollama Basic
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  ai-processing:
    runs-on: ubuntu-latest
    env:
      OLLAMA_HOST: 127.0.0.1:11435
      OLLAMA_MODELS: ${{ github.workspace }}/.ollama/models
      AWS_DEFAULT_REGION: us-east-2
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize enterprise monitoring
        run: |
          python3 -c "
          import sys
          sys.path.append('.')
          from monitoring.dashboard import WorkflowMonitor

          monitor = WorkflowMonitor('ollama-enterprise')
          monitor.start_monitoring('${{ github.run_number }}', '${{ github.sha }}')
          print('Enterprise monitoring initialized')
          "

      - name: Cache Ollama installation
        uses: actions/cache@v4
        id: ollama-cache
        with:
          path: ~/ollama-install-cache
          key: ollama-install-${{ runner.os }}-v2

      - name: Install Ollama
        run: |
          if [ -f ~/ollama-install-cache/bin/ollama ] && find ~/ollama-install-cache -name llama-server -type f | grep -q .; then
            echo "Using cached Ollama installation and runtime files"
            sudo mkdir -p /usr/local/bin /usr/local/lib
            sudo cp ~/ollama-install-cache/bin/ollama /usr/local/bin/ollama
            sudo rm -rf /usr/local/lib/ollama
            sudo cp -R ~/ollama-install-cache/lib/ollama /usr/local/lib/ollama
            sudo chmod +x /usr/local/bin/ollama
          else
            echo "Installing Ollama for the first run"
            curl -fsSL https://ollama.com/install.sh | sh
            mkdir -p ~/ollama-install-cache/bin ~/ollama-install-cache/lib
            cp /usr/local/bin/ollama ~/ollama-install-cache/bin/
            cp -R /usr/local/lib/ollama ~/ollama-install-cache/lib/
            echo "Cached Ollama binary and runtime files for future runs"
          fi

      - name: Verify Ollama installation
        run: |
          ollama --version
          echo "Cache hit: ${{ steps.ollama-cache.outputs.cache-hit }}"

      - name: Cache Ollama model files
        uses: actions/cache@v4
        id: ollama-model-cache
        with:
          path: ${{ env.OLLAMA_MODELS }}
          key: ollama-models-${{ runner.os }}-${{ hashFiles('config.yaml') }}
          restore-keys: |
            ollama-models-${{ runner.os }}-

      - name: Start Ollama service
        run: |
          mkdir -p "$OLLAMA_MODELS"
          ollama serve > ollama.log 2>&1 &
          sleep 10

      - name: Download required models
        run: |
          python3 -c "
          from ollama_pipeline.config import load_config
          import subprocess

          config = load_config()
          models = set(config.get('model_assignments', {}).values())
          models.add(config.get('models', {}).get('classifier', 'llama3.2:1b'))
          models.add(config.get('models', {}).get('default', 'llama3.2:1b'))

          for model in models:
              print(f'Ensuring model available: {model}')
              subprocess.run(['ollama', 'pull', model], check=True)
          "

      - name: Setup Python environment
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyyaml

      - name: Run modured test suite
        id: modular-tests
        run: |
          python3 -c "
          import sys, time
          sys.path.append('.')
          from monitoring.dashboard import WorkflowMonitor
          from scripts.test_runner import run_all_tests

          monitor = WorkflowMonitor('ollama-enterprise')
          monitor.start_monitoring('${{ github.run_number }}', '${{ github.sha }}')

          start = time.time()
          try:
              with monitor.logger.timer('test_execution'):
                  success = run_all_tests()
              duration = time.time() - start
              monitor.monitor_operation('test_execution', duration, success)
          except Exception as e:
              duration = time.time() - start
              monitor.track_error('test_execution_failed', str(e))
              monitor.monitor_operation('test_execution', duration, False)
          "
        continue-on-error: true

      - name: Run critical tests
        run: pytest tests/ -m critical -v --tb=short

      - name: Run full test suite with coverage
        run: pytest tests/ -v --cov=tests --junitxml=test-results.xml --cov-report=xml

      - name: Run advisory tests
        continue-on-error: true
        run: pytest tests/ -m advisory -v

      - name: Run multi-model analysis pipeline
        run: |
          python3 -c "
          from ollama_pipeline import ResultStorage, load_config
          from ollama_pipeline.analysis import analyze_repository

          config = load_config()
          storage = ResultStorage('results')
          result_dir = storage.create_run_directory('${{ github.run_number }}')

          results = analyze_repository('.', config, storage=storage, result_dir=result_dir)

          for r in results:
              print(f'{r.task_type} via {r.model} took {r.duration_seconds}s')

          storage.commit_all(
              result_dir,
              workflow_run='${{ github.run_number }}',
              commit_sha='${{ github.sha }}',
              extra_metadata={'files_analyzed': len(results)}
          )

          with open('current_result_dir.txt', 'w') as f:
              f.write(str(result_dir))
          "

      - name: Generate historical report
        run: |
          python3 scripts/generate_report.py --results-dir results --output historical_report.md
          cat historical_report.md

      - name: Upload results to S3
        if: env.AWS_ACCESS_KEY_ID != ''
        run: |
          python3 -c "
          import sys
          sys.path.append('.')
          from cloud.s3_manager import S3Manager
          from pathlib import Path

          s3 = S3Manager()
          s3.create_bucket_if_needed()

          result_dirs = list(Path('results').glob('run-*'))
          if result_dirs:
              latest = max(result_dirs, key=lambda p: p.stat().st_mtime)

              metadata = {
                  'workflow_run': '${{ github.run_number }}',
                  'commit_sha': '${{ github.sha }}',
                  'branch': '${{ github.ref_name }}'
              }

              s3.upload_workflow_results(latest, '${{ github.run_number }}', metadata)
          else:
              print('No result directories found')
          "
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
        continue-on-error: true

      - name: Generate monitoring summary
        if: always()
        run: |
          python3 -c "
          import sys, shutil
          from pathlib import Path
          sys.path.append('.')
          from monitoring.dashboard import WorkflowMonitor

          monitor = WorkflowMonitor('ollama-enterprise')
          monitor.start_monitoring('${{ github.run_number }}', '${{ github.sha }}')

          try:
              result_dir = Path(open('current_result_dir.txt').read().strip())
          except FileNotFoundError:
              result_dir = Path('results/monitoring')
              result_dir.mkdir(parents=True, exist_ok=True)

          summary = monitor.generate_summary(result_dir)

          if Path('logs').exists():
              shutil.copytree('logs', result_dir / 'logs', dirs_exist_ok=True)

          print(f'Duration: {summary[\"duration_seconds\"]}s')
          print(f'Health: {summary[\"health\"][\"checks\"]}')
          "

      - name: Performance benchmarking
        run: |
          echo "=== Workflow Performance Report ===" > performance-report.txt
          echo "Timestamp: $(date)" >> performance-report.txt
          echo "Workflow Run: ${{ github.run_number }}" >> performance-report.txt
          echo "Binary Cache Hit: ${{ steps.ollama-cache.outputs.cache-hit }}" >> performance-report.txt
          echo "Model Cache Hit: ${{ steps.ollama-model-cache.outputs.cache-hit }}" >> performance-report.txt
          start_time=$(date +%s)
          ollama run llama3.2:1b "What is continuous integration?" > ai_response.txt
          end_time=$(date +%s)
          response_time=$((end_time - start_time))
          echo "AI Response Time: ${response_time} seconds" >> performance-report.txt
          echo "Response Length: $(wc -w < ai_response.txt) words" >> performance-report.txt
          cat performance-report.txt

      - name: Write dashboard summary
        if: always()
        run: |
          echo "## Enterprise Monitoring Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Binary Cache Hit | ${{ steps.ollama-cache.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Model Cache Hit | ${{ steps.ollama-model-cache.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See job logs for classification, routing, and health check details." >> $GITHUB_STEP_SUMMARY

      - name: Configure git for automated commits
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Commit results and report
        run: |
          git add results/ historical_report.md
          git commit -m "Add results and monitoring from workflow run #${{ github.run_number }}" || echo "No changes to commit"
          git push origin main || echo "Push failed - may need permissions"
        continue-on-error: true

      - name: Upload workflow results
        uses: actions/upload-artifact@v4
        with:
          name: workflow-results-${{ github.run_number }}
          path: |
            results/
            logs/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-run-${{ github.run_number }}
          path: |
            test-results.xml
            coverage.xml
            performance-report.txt
          retention-days: 30
