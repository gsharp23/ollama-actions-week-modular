---
name: Ollama Basic
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  ai-processing:
    runs-on: ubuntu-latest
    env:
      OLLAMA_HOST: 127.0.0.1:11435
      OLLAMA_MODELS: ${{ github.workspace }}/.ollama/models
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Ollama installation
        uses: actions/cache@v4
        id: ollama-cache
        with:
          path: ~/ollama-install-cache
          key: ollama-install-${{ runner.os }}-v2

      - name: Install Ollama
        run: |
          if [ -f ~/ollama-install-cache/bin/ollama ] && find ~/ollama-install-cache -name llama-server -type f | grep -q .; then
            echo "Using cached Ollama installation and runtime files"
            sudo mkdir -p /usr/local/bin /usr/local/lib
            sudo cp ~/ollama-install-cache/bin/ollama /usr/local/bin/ollama
            sudo rm -rf /usr/local/lib/ollama
            sudo cp -R ~/ollama-install-cache/lib/ollama /usr/local/lib/ollama
            sudo chmod +x /usr/local/bin/ollama
          else
            echo "Installing Ollama for the first run"
            curl -fsSL https://ollama.com/install.sh | sh
            mkdir -p ~/ollama-install-cache/bin ~/ollama-install-cache/lib
            cp /usr/local/bin/ollama ~/ollama-install-cache/bin/
            cp -R /usr/local/lib/ollama ~/ollama-install-cache/lib/
            echo "Cached Ollama binary and runtime files for future runs"
          fi

      - name: Verify Ollama installation
        run: |
          ollama --version
          echo "Cache hit: ${{ steps.ollama-cache.outputs.cache-hit }}"

      - name: Cache Ollama model files
        uses: actions/cache@v4
        id: ollama-model-cache
        with:
          path: ${{ env.OLLAMA_MODELS }}
          key: ollama-models-${{ runner.os }}-llama3.2-1b-v1
          restore-keys: |
            ollama-models-${{ runner.os }}-
            ollama-models-

      - name: Start Ollama service
        run: |
          mkdir -p "$OLLAMA_MODELS"
          ollama serve > ollama.log 2>&1 &
          sleep 10

      - name: Download llama3.2 model
        if: steps.ollama-model-cache.outputs.cache-hit != 'true'
        run: |
          echo "Model cache miss. Downloading llama3.2:1b..."
          ollama pull llama3.2:1b

      - name: Verify model availability
        run: |
          echo "Model cache hit: ${{ steps.ollama-model-cache.outputs.cache-hit }}"
          ollama list

      - name: Run modular test suite
        id: modular-tests
        run: |
          echo "Running modular test suite..."
          python3 scripts/test_runner.py
        continue-on-error: true

      - name: Setup Python testing environment
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run critical tests
        run: pytest tests/ -m critical -v --tb=short

      - name: Run full test suite with coverage
        run: pytest tests/ -v --cov=tests --junitxml=test-results.xml --cov-report=xml

      - name: Run advisory tests
        continue-on-error: true
        run: pytest tests/ -m advisory -v

      - name: Create timestamped result directory
        run: |
          python3 -c "
          import sys
          sys.path.append('.')
          from utils.directory_manager import DirectoryManager

          dm = DirectoryManager('results')
          result_dir = dm.create_timestamped_dir('run-${{ github.run_number }}')

          with open('current_result_dir.txt', 'w') as f:
              f.write(str(result_dir))

          print(f'Created result directory: {result_dir}')
          "

      - name: Generate workflow results
        run: |
          RESULT_DIR=$(cat current_result_dir.txt)

          echo "Generating AI analysis..."
          WORKFLOW_FILE=".github/workflows/ollama-basic.yml"
          PROMPT="Analyze this GitHub Actions workflow and suggest three specific improvements for production use. Focus on security, performance, and maintainability."
          WORKFLOW_CONTENT=$(cat "$WORKFLOW_FILE")

          ollama run llama3.2:1b "$PROMPT

          $WORKFLOW_CONTENT" > "$RESULT_DIR/workflow-analysis.txt"

          echo "AI Analysis:"
          cat "$RESULT_DIR/workflow-analysis.txt"

          echo "Workflow Run: ${{ github.run_number }}" > "$RESULT_DIR/metadata.txt"
          echo "Timestamp: $(date)" >> "$RESULT_DIR/metadata.txt"
          echo "Commit: ${{ github.sha }}" >> "$RESULT_DIR/metadata.txt"

          echo "Results saved to $RESULT_DIR"
          ls -la "$RESULT_DIR"

      - name: Performance benchmarking
        run: |
          echo "=== Workflow Performance Report ===" > performance-report.txt
          echo "Timestamp: $(date)" >> performance-report.txt
          echo "Workflow Run: ${{ github.run_number }}" >> performance-report.txt
          echo "Binary Cache Hit: ${{ steps.ollama-cache.outputs.cache-hit }}" >> performance-report.txt
          echo "Model Cache Hit: ${{ steps.ollama-model-cache.outputs.cache-hit }}" >> performance-report.txt
          start_time=$(date +%s)
          ollama run llama3.2:1b "What is continuous integration?" > ai_response.txt
          end_time=$(date +%s)
          response_time=$((end_time - start_time))
          echo "AI Response Time: ${response_time} seconds" >> performance-report.txt
          echo "Response Length: $(wc -w < ai_response.txt) words" >> performance-report.txt
          cat performance-report.txt

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(grep -rc "def test_" tests/*.py | awk -F: '{s+=$2} END {print s}')
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Binary Cache | ${{ steps.ollama-cache.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Model Cache | ${{ steps.ollama-model-cache.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY

      - name: Configure git for automated commits
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Commit results to repository
        run: |
          RESULT_DIR=$(cat current_result_dir.txt)
          git add results/
          git commit -m "Add results from workflow run #${{ github.run_number }}" || echo "No changes to commit"
          git push origin main || echo "Push failed - may need permissions"
        continue-on-error: true

      - name: Upload workflow results
        uses: actions/upload-artifact@v4
        with:
          name: workflow-results-${{ github.run_number }}
          path: results/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-run-${{ github.run_number }}
          path: |
            test-results.xml
            coverage.xml
            performance-report.txt
          retention-days: 30
